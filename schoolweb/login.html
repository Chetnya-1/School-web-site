<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Government Senior Secondary School Kakira</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 40px;
      background: var(--card-bg);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-xl);
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--primary);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      font-size: 16px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--gradient-primary);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .error {
      color: #dc3545;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/Himachal-Pradesh-Board-Of-School-Education.png" alt="School Logo">
      <h1>Government Senior Secondary School kakira<span class="location">- Chamba  Himachal Pradesh</span></h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#gallery">Gallery</a></li>
        <li><a href="index.html#staff">Staff</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="login-container">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
      <div id="error" class="error" style="display: none;"></div>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');

      // Simple authentication (in a real app, this would be server-side)
      if (username === 'admin' && password === 'school2024') {
        // Store login status
        localStorage.setItem('adminLoggedIn', 'true');
        // Redirect to admin panel
        window.location.href = 'admin.html';
      } else {
        errorDiv.textContent = 'Invalid username or password';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
